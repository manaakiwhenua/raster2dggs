name: test

on: [push]

permissions:
  contents: read

jobs:
  pytest:
    uses: ./.github/workflows/run-tests.yml

  black:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install black
        run: pip install black

      - name: Check formatting
        run: black --check .
